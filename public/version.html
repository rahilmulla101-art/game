<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Game Monitor</title>
    <!-- Load Socket.io Client -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e11;
            color: #eaecef;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: #1e2329;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #333;
            text-align: center;
        }

        h1 { margin-bottom: 5px; font-size: 22px; color: #f0b90b; }
        #status { font-size: 12px; margin-bottom: 20px; color: #0ecb81; }

        .timer-circle {
            width: 100px;
            height: 100px;
            border: 4px solid #f0b90b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            margin: 20px auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #2b3139;
            padding: 15px;
            border-radius: 10px;
        }

        .label { font-size: 12px; color: #848e9c; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .value { font-size: 18px; font-weight: bold; color: #fff; }

        .round-id { margin-top: 15px; font-size: 14px; color: #848e9c; }
        
        .hidden { display: none; }
        .dragon-text { color: #ff3e3e; }
        .tiger-text { color: #3e8bff; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">Loading...</h1>
        <p id="status">Connecting to server...</p>

        <!-- Dragon vs Tiger Stats View -->
        <div id="dt-view" class="hidden">
            <div class="timer-circle" id="dt-timer">0</div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="label dragon-text">Dragon Total</span>
                    <span class="value" id="val-dragon">0</span>
                </div>
                <div class="stat-box">
                    <span class="label tiger-text">Tiger Total</span>
                    <span class="value" id="val-tiger">0</span>
                </div>
            </div>
            <div class="round-id">Round ID: <span id="dt-round-id">-</span></div>
        </div>

        <!-- Color Prediction Stats View -->
        <div id="cl-view" class="hidden">
            <div class="timer-circle" id="cl-timer">0</div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="label" style="color: #f6465d;">Red Total</span>
                    <span class="value" id="val-red">0</span>
                </div>
                <div class="stat-box">
                    <span class="label" style="color: #0ecb81;">Green Total</span>
                    <span class="value" id="val-green">0</span>
                </div>
            </div>
            <div class="round-id">Round ID: <span id="cl-round-id">-</span></div>
        </div>
    </div>

    <script>
        const socket = io();
        const version = localStorage.getItem("version");

        // 1. Initial UI Logic
        if (version === "dt") {
            document.getElementById("title").innerText = "Dragon Tiger Monitor";
            document.getElementById("dt-view").classList.remove("hidden");
        } else if (version === "cl") {
            document.getElementById("title").innerText = "Color Game Monitor";
            document.getElementById("cl-view").classList.remove("hidden");
        } else {
            document.body.innerHTML = "<h1>Unauthorized Access</h1>";
        }

        // 2. Loop to request data every second
        socket.on('connect', () => {
            document.getElementById('status').innerText = "Real-time sync active";
            document.getElementById('status').style.color = "#0ecb81";

            setInterval(() => {
                if (version === "dt") {
                    socket.emit('gg'); // Request from dragonvstiger.js
                } else if (version === "cl") {
                    socket.emit('gg_cl'); // Request from color_server.js
                }
            }, 1000);
        });

        // 3. Receive Dragon Tiger Response
        socket.on('gg_response', (data) => {
            // Mapping server variables: A (timer), C (Round ID), BetDragon, BetTiger
            document.getElementById('dt-timer').innerText = data.A;
            document.getElementById('dt-round-id').innerText = data.C;
            document.getElementById('val-dragon').innerText = data.BetDragon;
            document.getElementById('val-tiger').innerText = data.BetTiger;
        });

        // 4. Receive Color Game Response (If implemented similarly)
        socket.on('gg_cl_response', (data) => {
            document.getElementById('cl-timer').innerText = data.A;
            document.getElementById('cl-round-id').innerText = data.C;
            document.getElementById('val-red').innerText = data.BetRed; // Assuming these names
            document.getElementById('val-green').innerText = data.BetGreen;
        });

        socket.on('disconnect', () => {
            document.getElementById('status').innerText = "Disconnected from Server";
            document.getElementById('status').style.color = "#f6465d";
        });
    </script>
</body>
</html>
