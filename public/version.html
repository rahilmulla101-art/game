<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ACCESS - ADMIN</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Hacker Style CSS */
        body { 
            background-color: black; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .terminal {
            width: 90%;
            max-width: 500px;
            border: 2px solid #00ff00;
            padding: 40px;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px #00ff00;
            border-radius: 5px;
            text-align: center;
        }

        .glitch {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff00;
        }

        .status-line {
            font-size: 14px;
            margin-bottom: 30px;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
        }

        .hacker-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin-top: 20px;
            background: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .hacker-btn:hover {
            background: #00ff00;
            color: black;
            box-shadow: 0 0 30px #00ff00;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 0, 0.1);
            position: absolute;
            top: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        #access-text {
            font-size: 12px;
            margin-top: 20px;
            color: #008800;
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="terminal">
        <div class="glitch">SYSTEM_ACCESS</div>
        <div class="status-line">STATUS: <span id="conn-status">CONNECTED_TO_SERVER</span></div>

        <!-- THE LINK BUTTON -->
        <a href="color_hacked.html" class="hacker-btn">
            > RUN COLOR_PREDICTION_ENGINE
        </a>

        <div id="access-text">
            BYPASSING ENCRYPTION... [OK]<br>
            FETCHING ROUND_DATA... [OK]<br>
            ESTABLISHING SECURE_TUNNEL... [OK]
        </div>
    </div>

    <script>
        // Check version from login
        const version = localStorage.getItem("version");

        if (version !== "cl" && version !== "dt") {
            // If no version found, lock the terminal
            document.querySelector(".terminal").innerHTML = "<div class='glitch' style='color:red;'>ACCESS_DENIED</div>";
        }

        // Standard connection check
        const socket = io();
        socket.on('connect', () => {
            document.getElementById('conn-status').innerText = "V3_ENCRYPTION_ACTIVE";
        });

        socket.on('disconnect', () => {
            document.getElementById('conn-status').innerText = "CONNECTION_LOST";
            document.getElementById('conn-status').style.color = "red";
        });
    </script>
</body>
</html>
