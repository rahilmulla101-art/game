<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ACCESS - EXPLOIT V3</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { 
            background-color: #000; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .terminal-window {
            width: 100%;
            max-width: 700px;
            height: 500px;
            border: 1px solid #00ff00;
            background: rgba(0, 10, 0, 0.95);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Scanline effect */
        .terminal-window::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 100, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .header {
            background: #00ff00;
            color: #000;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        .output-area {
            flex: 1;
            padding: 15px;
            overflow-y: hidden;
            font-size: 14px;
            line-height: 1.4;
        }

        /* The Live Hack Data Display */
        .live-data-panel {
            border-top: 1px solid #004400;
            padding: 15px;
            background: #000800;
        }

        .prediction-text {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff00;
            color: #fff;
        }

        .log-entry { margin-bottom: 2px; }
        .green { color: #00ff00; }
        .yellow { color: #ffff00; }
        .red { color: #ff0000; }

        .hacker-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            color: #000;
            background: #00ff00;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 3px;
        }
        .hacker-btn:hover { background: #fff; box-shadow: 0 0 15px #fff; }
    </style>
</head>
<body>

    <div class="terminal-window">
        <div class="header">
            <span>CORE_EXPLOIT_V3.exe</span>
            <span>ID: <span id="header-period">-----</span></span>
        </div>

        <!-- Scrolling CMD Logs -->
        <div class="output-area" id="terminal-logs">
            <div class="log-entry">> Initializing decryption keys...</div>
            <div class="log-entry">> Bypassing Casino Firewall... [OK]</div>
            <div class="log-entry">> Memory Address 0x7FFD2 allocated.</div>
            <div class="log-entry">> Intercepting WebSocket Packets...</div>
        </div>

        <!-- Real Data Section -->
        <div class="live-data-panel">
            <div class="log-entry green">[SYSTEM STATUS: ANALYZING BETS]</div>
            <div class="log-entry">TIMER_SYNC: <span class="yellow" id="live-timer">00</span>s</div>
            <div class="log-entry">REAL_TIME_PREDICTION: 
                <span id="live-winner" class="prediction-text">WAITING...</span>
            </div>
            
            <div style="display: flex; gap: 20px; margin-top: 10px;">
                <a href="color_hacked.html" class="hacker-btn">> OPEN COLOR_CONSOLE</a>
            </div>
        </div>
    </div>

    <script>
        const version = localStorage.getItem("version");
        const socket = io("/"); 
        

        const logArea = document.getElementById('terminal-logs');

        // Function to add dummy CMD logs
        function addLog(text, colorClass = "") {
            const div = document.createElement('div');
            div.className = 'log-entry ' + colorClass;
            div.innerText = "> " + text;
            logArea.appendChild(div);
            if (logArea.childNodes.length > 15) logArea.removeChild(logArea.firstChild);
        }

        // Dummy commands loop
        const commands = [
            "Intercepting pool data...",
            "Tracing user_ID 0x442...",
            "Calculating house liability...",
            "Analyzing betting spreads...",
            "Injected payload to 0x00FF21",
            "Bypassing secure_socket_layer...",
            "Optimizing outcome probability..."
        ];
        setInterval(() => {
            addLog(commands[Math.floor(Math.random() * commands.length)]);
        }, 3000);

        // --- Logic to get REAL DATA from server ---
        socket.on('connect', () => addLog("DT_SYSTEM_TUNNEL: STABLE", "green"));
   

        // Polling loop for current version
        setInterval(() => {
            if (version === "dt") socket.emit('gg');

        }, 1000);

        // Update UI with real server data (Dragon Tiger)
        socket.on('gg_response_DT', (data) => {
            conosle.log("Received DT data:", data);
            if(version === "dt") {
                document.getElementById('live-timer').innerText = data.A;
                document.getElementById('header-period').innerText = data.C;
                const win = document.getElementById('live-winner');
                win.innerText = data.winner;
                win.style.color = (data.winner === "DRAGON") ? "#ff4d4d" : "#3e8bff";
            }
        });

        // Update UI with real server data (Color)

    </script>
</body>
</html>
