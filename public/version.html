<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Admin Monitor</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0e11; color: #eaecef; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; background: #1e2329; padding: 20px; border-radius: 16px; border: 1px solid #333; text-align: center; }
        h1 { font-size: 20px; color: #f0b90b; margin-bottom: 5px; }
        #status { font-size: 11px; margin-bottom: 20px; color: #0ecb81; }
        
        .timer-box { font-size: 48px; font-weight: bold; margin: 10px 0; color: #fff; }
        
        .winner-display {
            background: #2b3139;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border: 2px dashed #444;
        }
        .winner-label { font-size: 12px; color: #848e9c; text-transform: uppercase; }
        #predicted-winner { font-size: 24px; font-weight: bold; display: block; margin-top: 5px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #2b3139; padding: 12px; border-radius: 8px; }
        .label { font-size: 11px; color: #848e9c; display: block; }
        .value { font-size: 16px; font-weight: bold; }

        .dragon-text { color: #ff3e3e; }
        .tiger-text { color: #3e8bff; }
        .win-color { color: #0ecb81; } /* Green for Predicted Winner */
        
        .hidden { display: none; }
        .round-info { margin-top: 15px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">Monitor</h1>
        <p id="status">Connecting...</p>

        <div id="dt-view" class="hidden">
            <div class="winner-display">
                <span class="winner-label">Current Predicted Winner (Lower Side)</span>
                <span id="predicted-winner">CALCULATING...</span>
            </div>

            <div class="timer-box" id="dt-timer">00</div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="label dragon-text">Dragon Total</span>
                    <span class="value" id="val-dragon">0</span>
                </div>
                <div class="stat-box">
                    <span class="label tiger-text">Tiger Total</span>
                    <span class="value" id="val-tiger">0</span>
                </div>
            </div>
            <div class="round-info">Round: <span id="dt-round-id">-</span></div>
        </div>

        <!-- Color View -->
        <div id="cl-view" class="hidden">
            <div class="winner-display">
                <span class="winner-label">Predicted Winner</span>
                <span id="cl-predicted-winner">...</span>
            </div>
            <div class="timer-box" id="cl-timer">00</div>
            <div class="stats-grid" id="cl-stats">
                <!-- Color stats go here -->
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const version = localStorage.getItem("version");

        if (version === "dt") {
            document.getElementById("title").innerText = "Dragon Tiger Admin";
            document.getElementById("dt-view").classList.remove("hidden");
        } else if (version === "cl") {
            document.getElementById("title").innerText = "Color Admin";
            document.getElementById("cl-view").classList.remove("hidden");
        }

        socket.on('connect', () => {
            document.getElementById('status').innerText = "LIVE SYNC ACTIVE";
            
            setInterval(() => {
                if (version === "dt") socket.emit('gg');
                if (version === "cl") socket.emit('gg_cl');
            }, 1000);
        });

        socket.on('gg_response', (data) => {
            // Update Text
            document.getElementById('dt-timer').innerText = data.A;
            document.getElementById('dt-round-id').innerText = data.C;
            document.getElementById('val-dragon').innerText = data.BetDragon;
            document.getElementById('val-tiger').innerText = data.BetTiger;
            
            const winEl = document.getElementById('predicted-winner');
            winEl.innerText = data.winner;

            // Dynamic Styling for the Winner name
            if(data.winner === "DRAGON") {
                winEl.style.color = "#ff3e3e"; // Red
            } else if (data.winner === "TIGER") {
                winEl.style.color = "#3e8bff"; // Blue
            } else {
                winEl.style.color = "#ffffff"; // White for Tie
            }
        });

        socket.on('disconnect', () => {
            document.getElementById('status').innerText = "OFFLINE";
            document.getElementById('status').style.color = "red";
        });
    </script>
</body>
</html>
