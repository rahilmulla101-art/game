<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Area Secure Gateway</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;650&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .display-font {
        font-family: 'Space Grotesk', sans-serif;
      }
      .mono-font {
        font-family: 'JetBrains Mono', sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#05060a] text-gray-200 min-h-screen flex flex-col justify-between overflow-x-hidden">
    
    <!-- Cyber Security Background Grid -->
    <div class="absolute top-0 left-0 w-full h-[500px] bg-[linear-gradient(to_bottom,rgba(16,24,48,0.2)_1px,transparent_1px),linear-gradient(to_right,rgba(16,24,48,0.2)_1px,transparent_1px)] bg-[size:4rem_4rem] z-0"></div>
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[300px] bg-red-500/5 blur-[100px] rounded-full pointer-events-none z-0"></div>

    <header class="border-b border-red-500/10 bg-black/50 backdrop-blur-md relative z-10">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <a href="/" class="flex items-center gap-3">
          <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-red-650 to-red-950 flex items-center justify-center shadow-lg border border-red-500/20">
            <span class="text-xl">⚙️</span>
          </div>
          <div>
            <h1 class="text-lg font-bold tracking-tight display-font text-red-500">
              PLATFORM CONSOLE
            </h1>
            <p class="text-[10px] text-red-400/50 font-mono tracking-widest uppercase">Admin Secure Access</p>
          </div>
        </a>
        <a href="login.html" class="text-xs text-gray-400 hover:text-white transition font-mono border border-gray-800 px-3 py-1.5 rounded-lg bg-gray-900/30">Player Login</a>
      </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6 relative z-10">
      <div class="w-full max-w-sm bg-gray-950/80 border border-red-950/40 rounded-2xl p-8 backdrop-blur-xl shadow-2xl relative">
        
        <!-- Secure Header -->
        <div class="text-center mb-8">
          <div class="h-12 w-12 rounded-full bg-red-950/50 border border-red-500/30 flex items-center justify-center mx-auto mb-3">
            <span class="text-red-500 text-lg">🔒</span>
          </div>
          <h2 class="text-lg font-semibold display-font text-white tracking-wide">SECURE ADMINISTRATIVE VERIFICATION</h2>
          <p class="text-xs text-gray-500 font-mono mt-1">Authorized logins only. Activity catalogued.</p>
        </div>

        <form onsubmit="handleAdminLogin(event)" class="space-y-6">
          <div>
            <label class="block text-xs uppercase font-mono tracking-wider text-red-500/85 mb-2">Username</label>
            <input type="text" id="admin-user" placeholder="Enter admin username" required
                   class="w-full bg-black/80 border border-gray-800 focus:border-red-500/40 rounded-xl py-3 px-4 text-sm outline-none transition text-white placeholder-gray-700 font-mono focus:ring-1 focus:ring-red-500/10" />
          </div>

          <div>
            <label class="block text-xs uppercase font-mono tracking-wider text-red-500/85 mb-2">Passcode</label>
            <input type="password" id="admin-password" placeholder="••••••••••••••" required
                   class="w-full bg-black/80 border border-gray-800 focus:border-red-500/40 rounded-xl py-3 px-4 text-sm outline-none transition text-white placeholder-gray-700 font-mono focus:ring-1 focus:ring-red-500/10" />
          </div>

          <button type="submit" class="w-full py-4 bg-red-800/80 hover:bg-red-700 text-white text-xs font-bold font-mono tracking-widest rounded-xl transition duration-350 border border-red-750 cursor-pointer shadow-lg shadow-red-900/10">
            SYSTEM DIRECTORY INGRESS
          </button>
        </form>
      </div>
    </main>

    <footer class="border-t border-gray-900 bg-black/80 py-6 relative z-10">
      <div class="max-w-7xl mx-auto px-6 text-center text-xs text-gray-650 font-mono">
        <p>&copy; 2026 Platform Control Terminal. Security protocols standard.</p>
      </div>
    </footer>

    <!-- API Client Scripts -->
    <script src="/js/api.js"></script>
    <script>
      // Automatic session ingress check
      const checkActiveAdminSession = () => {
        const token = localStorage.getItem('dvt_admin_token');
        if (token) {
          window.location.href = 'admin-dashboard.html';
        }
      };
      
      window.addEventListener('DOMContentLoaded', checkActiveAdminSession);

      async function handleAdminLogin(e) {
        e.preventDefault();
        const username = document.getElementById('admin-user').value.trim();
        const pwd = document.getElementById('admin-password').value.trim();

        const response = await api.adminLogin(username, pwd);
        if (response.success) {
          localStorage.setItem('dvt_admin_token', response.data.token);
          localStorage.setItem('dvt_admin_user', JSON.stringify(response.data.admin));
          api.showToast('success', 'Admin session approved. Directing to administrative terminal...');
          setTimeout(() => {
            window.location.href = 'admin-dashboard.html';
          }, 1000);
        } else {
          // Toast message auto-handles by apiCall errors
        }
      }
    </script>
  </body>
</html>
