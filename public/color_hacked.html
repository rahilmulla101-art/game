<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL: COLOR_V2</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Mobile-First Hacker Styles */
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 100, 0.03));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .header {
            font-size: 10px;
            text-align: center;
            border: 1px solid #0f0;
            padding: 5px;
            margin-bottom: 10px;
            background: rgba(0, 40, 0, 0.3);
        }

        /* Top Panel: Prediction & Timer */
        .live-panel {
            border: 1px solid #0f0;
            background: rgba(0, 20, 0, 0.8);
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        .prediction-label {
            font-size: 12px;
            color: #888;
            letter-spacing: 2px;
        }

        #prediction {
            font-size: 42px;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 10px currentColor;
            display: block;
        }

        .timer-row {
            font-size: 20px;
            color: #fff;
            margin-top: 5px;
        }

        .period-info {
            font-size: 10px;
            color: #0a0;
            margin-top: 10px;
        }

        /* Bottom Panel: CMD Logs */
        .log-container {
            flex: 1;
            margin-top: 10px;
            border: 1px solid #050;
            padding: 10px;
            font-size: 11px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
            background: rgba(0, 5, 0, 0.9);
        }

        .log-entry {
            margin-bottom: 4px;
            border-left: 2px solid #050;
            padding-left: 5px;
        }

        .log-entry.system { color: #fff; font-weight: bold; }
        .log-entry.alert { color: #ff0; }

        .btn-row {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid #0f0;
            color: #0f0;
            text-decoration: none;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
        }

        .action-btn:active {
            background: #0f0;
            color: #000;
        }

        /* Pulsing animation for the winner */
        .pulse {
            animation: pulse-animation 1s infinite;
        }

        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        SECURE_CONNECTION // ROOT@COLOR_SERVER_V2
    </div>

    <!-- Real-time Prediction Display -->
    <div class="live-panel">
        <span class="prediction-label">NEXT_COLOR_EXPECTED</span>
        <span id="prediction" class="pulse">ANALYZING</span>
        
        <div class="timer-row">
            T-MINUS: <span id="timer">00</span>s
        </div>
        
        <div class="period-info">
            TARGET_ID: <span id="period">-------</span>
        </div>
    </div>

    <!-- Scrolling CMD Logs -->
    <div class="log-container" id="log-box">
        <div class="log-entry">[-] Attempting memory injection at 0x44A...</div>
        <div class="log-entry">[!] Bypassing period verification...</div>
    </div>

    <!-- Navigation -->
    <div class="btn-row">
        <a href="version.html" class="action-btn">EXIT_TERMINAL</a>
    </div>

    <script>
        const socket = io("/color");
        const logBox = document.getElementById('log-box');

        // Hacking Keyword Rotation
        const cmdPhrases = [
            "Intercepting pool liabilities...",
            "Decrypting salt_nonce 0x882...",
            "Tracing winning probability...",
            "Payload deployed to /api/result...",
            "Memory buffer overflow successful...",
            "Extracting period_seed...",
            "Bypassing node_firewall...",
            "Analyzing side_bet_totals...",
            "Overriding random_generator..."
        ];

        function addHackerLog(text, type = "") {
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.innerText = "> " + text;
            logBox.prepend(entry);
            if (logBox.childNodes.length > 25) logBox.removeChild(logBox.lastChild);
        }

        // Random log generator
        setInterval(() => {
            addHackerLog(cmdPhrases[Math.floor(Math.random() * cmdPhrases.length)]);
        }, 2000);

        socket.on('connect', () => {
            addHackerLog("ESTABLISHED_ASYNC_TUNNEL", "system");
            
            // Start requesting data
            setInterval(() => {
                socket.emit('gg_cl');
            }, 1000);
        });

        // Handle the Real-Time Data from Server
        socket.on('gg_cl_response', (data) => {
            document.getElementById('timer').innerText = data.A;
            document.getElementById('period').innerText = data.C;
            
            const predText = document.getElementById('prediction');
            predText.innerText = data.winner;

            // Apply specific color styling
            if(data.winner === "RED") {
                predText.style.color = "#ff4d4d";
            } else if(data.winner === "GREEN") {
                predText.style.color = "#00ff88";
            } else if(data.winner === "VIOLET") {
                predText.style.color = "#bb66ff";
            } else {
                predText.style.color = "#ffffff";
            }
        });

        socket.on('disconnect', () => {
            addHackerLog("CONNECTION_TERMINATED_BY_HOST", "alert");
        });
    </script>
</body>
</html>
