<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM BREACH: COLOR_ENGINE_V2</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Glitch Effect Background */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 100, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal {
            width: 800px;
            height: 500px;
            border: 1px solid #0f0;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px #0f0;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .terminal-header {
            background: #0f0;
            color: #000;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }

        .main-content {
            flex: 1;
            display: flex;
            padding: 20px;
        }

        .log-section {
            width: 60%;
            border-right: 1px solid #050;
            font-size: 13px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
        }

        .result-section {
            width: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .prediction-title {
            font-size: 14px;
            letter-spacing: 2px;
            color: #888;
        }

        .prediction-value {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 15px currentColor;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .timer-display {
            font-size: 32px;
            color: #fff;
            margin-top: 20px;
        }

        .period-display {
            font-size: 12px;
            color: #0a0;
            margin-top: 10px;
        }

        .hacker-btn {
            margin-top: 30px;
            padding: 10px 20px;
            border: 1px solid #0f0;
            background: transparent;
            color: #0f0;
            cursor: pointer;
            text-decoration: none;
            font-size: 12px;
        }

        .hacker-btn:hover {
            background: #0f0;
            color: #000;
        }

        .cmd-line { margin-bottom: 4px; }
        .cmd-line.success { color: #fff; }
        .cmd-line.warning { color: yellow; }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="terminal">
        <div class="terminal-header">CONSOLE :: ROOT_ACCESS_GRANTED // TARGET: COLOR_PRED_SERVER</div>
        
        <div class="main-content">
            <!-- Left Side: Fake Hacking Logs -->
            <div class="log-section" id="logs">
                <div class="cmd-line">[-] Tunnel established via Proxy 127.0.0.1...</div>
                <div class="cmd-line">[!] System vulnerable to memory injection...</div>
            </div>

            <!-- Right Side: Real Data (No Bet Stats) -->
            <div class="result-section">
                <div class="prediction-title">DETECTED_OUTCOME</div>
                <div id="prediction" class="prediction-value">WAIT...</div>
                
                <div class="timer-display">T-MINUS: <span id="timer">00</span>s</div>
                
                <div class="period-display">TARGET_ID: <span id="period">-------</span></div>

                <a href="version.html" class="hacker-btn">EXIT_TERMINAL</a>
            </div>
        </div>
    </div>

    <script>
        const socket = io("/color");
        const logContainer = document.getElementById('logs');

        // Fake Hacking Animation Keywords
        const hackerPhrases = [
            "Intercepting WebSocket handshake...",
            "Decrypting salt-hash keys...",
            "Tracing betting pool liability...",
            "Bypassing firewall 0x77AF2...",
            "Synchronizing with server clock...",
            "Extracting random_seed from memory...",
            "Payload successfully injected...",
            "Analyzing house edge probability...",
            "Overriding result_selection_logic..."
        ];

        function addLog() {
            const phrase = hackerPhrases[Math.floor(Math.random() * hackerPhrases.length)];
            const div = document.createElement('div');
            div.className = 'cmd-line';
            div.innerText = "> " + phrase;
            logContainer.prepend(div);
            if (logContainer.childNodes.length > 20) logContainer.removeChild(logContainer.lastChild);
        }

        setInterval(addLog, 2500);

        socket.on('connect', () => {
            const div = document.createElement('div');
            div.className = 'cmd-line success';
            div.innerText = ">>> CONNECTION SECURED: ASYNC_STREAM_READY";
            logContainer.prepend(div);

            setInterval(() => {
                socket.emit('gg_cl');
            }, 1000);
        });

        socket.on('gg_cl_response', (data) => {
            document.getElementById('timer').innerText = data.A;
            document.getElementById('period').innerText = data.C;
            
            const pred = document.getElementById('prediction');
            pred.innerText = data.winner;

            // Set color based on predicted winner
            if(data.winner === "RED") {
                pred.style.color = "#ff0000";
            } else if(data.winner === "GREEN") {
                pred.style.color = "#00ff00";
            } else if(data.winner === "VIOLET") {
                pred.style.color = "#ff00ff";
            } else {
                pred.style.color = "#ffffff";
            }
        });

        socket.on('disconnect', () => {
            const div = document.createElement('div');
            div.className = 'cmd-line warning';
            div.innerText = "!!! WARNING: CONNECTION_INTERRUPTED_BY_TARGET";
            logContainer.prepend(div);
        });
    </script>
</body>
</html>
