<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE_GATEWAY_V3</title>
    <style>
        /* Hacker Aesthetic CSS */
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 100, 0.03));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .terminal-container {
            width: 90%;
            max-width: 400px;
            border: 1px solid #00ff00;
            padding: 30px;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px #00ff00;
            position: relative;
        }

        h2 {
            text-align: center;
            font-size: 20px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
        }

        .status {
            font-size: 10px;
            color: #008800;
            margin-bottom: 20px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            box-sizing: border-box;
            outline: none;
        }

        input::placeholder {
            color: #004400;
        }

        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            font-family: 'Courier New', monospace;
        }

        button:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
        }

        pre {
            background: #000800;
            border: 1px solid #004400;
            padding: 10px;
            font-size: 12px;
            color: #00ff00;
            margin-top: 20px;
            overflow-x: auto;
            max-height: 100px;
        }

        .glitch-text {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <h2 class="glitch-text">GATEWAY_LOGIN</h2>
    <div class="status">> WAITING_FOR_AUTH_PACKETS...</div>

    <input id="token" placeholder="[ ENTER_AUTH_TOKEN ]">
    <input id="uuid" placeholder="[ ENTER_DEVICE_UUID ]">

    <button onclick="checkToken()">> BYPASS_FIREWALL</button>

    <pre id="result">{ "status": "idle" }</pre>
</div>

<script>
async function checkToken(){
    // KEEPING ORIGINAL LOGIC EXACTLY THE SAME
    const token =
        document.getElementById(
            "token"
        ).value;

    const uuid =
        document.getElementById(
            "uuid"
        ).value;

    // Displaying status in terminal style
    document.getElementById("result").innerText = "> INJECTING_CREDENTIALS...";

    const response =
        await fetch(
            "/api/check-token",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    token,
                    uuid
                })
            }
        );

    const data =
        await response.json();

    document.getElementById(
        "result"
    ).innerText =
        JSON.stringify(
            data,
            null,
            2
        );

    if(
        data.success &&
        data.version
    ){
        localStorage.setItem(
            "version",
            data.version
        );

        // Optional custom redirect text
        document.getElementById("result").innerText += "\n> ACCESS_GRANTED_TO_" + data.version.toUpperCase();

        setTimeout(() => {
            location.href = "version.html";
        }, 1000);
    }
}
</script>

</body>
</html>
